<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In / Sign Up</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #667eea, #764ba2);
      padding: 20px;
    }

    .container {
      width: 900px;
      max-width: 100%;
      min-height: 550px;
      background: #fff;
      border-radius: 20px;
      overflow: hidden;
      display: flex;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
    }

    .left-panel,
    .right-panel {
      width: 50%;
      padding: 50px 40px;
    }

    .left-panel {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .left-panel h1 {
      font-size: 34px;
      margin-bottom: 15px;
    }

    .left-panel p {
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 25px;
      color: #f3f4f6;
    }

    .switch-btn {
      padding: 12px 22px;
      border: 2px solid white;
      background: transparent;
      color: white;
      border-radius: 30px;
      cursor: pointer;
      font-size: 15px;
      transition: 0.3s;
      width: fit-content;
    }

    .switch-btn:hover {
      background: white;
      color: #4f46e5;
    }

    .right-panel {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #ffffff;
    }

    .form-box {
      width: 100%;
      max-width: 340px;
    }

    .form-box h2 {
      text-align: center;
      margin-bottom: 25px;
      color: #111827;
    }

    .input-group {
      margin-bottom: 16px;
    }

    .input-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      color: #374151;
      font-weight: 600;
    }

    .input-group input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      outline: none;
      font-size: 14px;
      transition: 0.3s;
    }

    .input-group input:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }

    .submit-btn {
      width: 100%;
      padding: 13px;
      border: none;
      background: #4f46e5;
      color: white;
      font-size: 15px;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 8px;
      transition: 0.3s;
    }

    .submit-btn:hover {
      background: #4338ca;
    }

    .extra-text {
      text-align: center;
      margin-top: 16px;
      font-size: 14px;
      color: #6b7280;
    }

    .extra-text a {
      color: #4f46e5;
      text-decoration: none;
      font-weight: bold;
      cursor: pointer;
    }

    .hidden {
      display: none;
    }

    .message {
      margin-top: 12px;
      text-align: center;
      font-size: 14px;
      font-weight: bold;
    }

    .success {
      color: green;
    }

    .error {
      color: red;
    }

    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }

      .left-panel,
      .right-panel {
        width: 100%;
      }

      .left-panel {
        text-align: center;
        align-items: center;
        padding: 35px 25px;
      }

      .right-panel {
        padding: 30px 20px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="left-panel">
      <h1 id="sideTitle">Welcome Back!</h1>
      <p id="sideText">
        To keep connected with us, please login with your personal details.
      </p>
      <button class="switch-btn" onclick="toggleForm()" id="switchButton">Sign Up</button>
    </div>

    <div class="right-panel">
      <div class="form-box">

        <!-- Sign In Form -->
        <form id="signInForm">
          <h2>Sign In</h2>

          <div class="input-group">
            <label>Email</label>
            <input type="email" id="signin-email" name="email" placeholder="Enter your email" required />
          </div>

          <div class="input-group">
            <label>Password</label>
            <input type="password" id="signin-password" name="password" placeholder="Enter your password" required />
          </div>

          <button type="submit" class="submit-btn">Sign In</button>

          <p class="extra-text">
            Don’t have an account?
            <a onclick="toggleForm()">Sign Up</a>
          </p>

          <div id="signin-message" class="message"></div>
        </form>

        <!-- Sign Up Form -->
        <form id="signUpForm" class="hidden">
          <h2>Create Account</h2>

          <div class="input-group">
            <label>Full Name</label>
            <input type="text" id="signup-name" name="name" placeholder="Enter your full name" required />
          </div>

          <div class="input-group">
            <label>Email</label>
            <input type="email" id="signup-email" name="email" placeholder="Enter your email" required />
          </div>

          <div class="input-group">
            <label>Password</label>
            <input type="password" id="signup-password" name="password" placeholder="Create a password" required />
          </div>

          <div class="input-group">
            <label>Confirm Password</label>
            <input type="password" id="signup-confirm-password" name="confirmPassword" placeholder="Confirm your password" required />
          </div>

          <button type="submit" class="submit-btn">Sign Up</button>

          <p class="extra-text">
            Already have an account?
            <a onclick="toggleForm()">Sign In</a>
          </p>

          <div id="signup-message" class="message"></div>
        </form>

      </div>
    </div>
  </div>

  <script>
    function toggleForm() {
      const signInForm = document.getElementById("signInForm");
      const signUpForm = document.getElementById("signUpForm");
      const sideTitle = document.getElementById("sideTitle");
      const sideText = document.getElementById("sideText");
      const switchButton = document.getElementById("switchButton");

      document.getElementById("signin-message").textContent = "";
      document.getElementById("signup-message").textContent = "";

      signInForm.classList.toggle("hidden");
      signUpForm.classList.toggle("hidden");

      if (signInForm.classList.contains("hidden")) {
        sideTitle.textContent = "Hello, Friend!";
        sideText.textContent = "Enter your personal details and start your journey with us.";
        switchButton.textContent = "Sign In";
      } else {
        sideTitle.textContent = "Welcome Back!";
        sideText.textContent = "To keep connected with us, please login with your personal details.";
        switchButton.textContent = "Sign Up";
      }
    }

    function showMessage(elementId, message, type) {
      const el = document.getElementById(elementId);
      el.textContent = message;
      el.className = "message " + type;
    }

    document.getElementById("signUpForm").addEventListener("submit", async function (e) {
      e.preventDefault();

      const name = document.getElementById("signup-name").value.trim();
      const email = document.getElementById("signup-email").value.trim();
      const password = document.getElementById("signup-password").value;
      const confirmPassword = document.getElementById("signup-confirm-password").value;

      if (password !== confirmPassword) {
        showMessage("signup-message", "Passwords do not match", "error");
        return;
      }

      try {
        const response = await fetch("/user/signup", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ name, email, password })
        });

        const data = await response.text();

        if (response.ok) {
          showMessage("signup-message", data, "success");
          document.getElementById("signUpForm").reset();
        } else {
          showMessage("signup-message", data, "error");
        }
      } catch (error) {
        showMessage("signup-message", "Server error during signup", "error");
      }
    });

    document.getElementById("signInForm").addEventListener("submit", async function (e) {
      e.preventDefault();

      const email = document.getElementById("signin-email").value.trim();
      const password = document.getElementById("signin-password").value;

      try {
        const response = await fetch("/user/signin", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ email, password })
        });

        const data = await response.text();

        if (response.ok) {
          showMessage("signin-message", data, "success");
          document.getElementById("signInForm").reset();
        } else {
          showMessage("signin-message", data, "error");
        }
      } catch (error) {
        showMessage("signin-message", "Server error during signin", "error");
      }
    });
  </script>

</body>
</html>
