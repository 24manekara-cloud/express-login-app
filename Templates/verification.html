<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verification Page</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow p-4" style="width: 380px;">
      <h3 class="text-center mb-4">Verification</h3>

      <form id="verify-form">
        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input type="text" id="email" class="form-control" />
          <small id="email-error" class="text-danger"></small>
        </div>

        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input type="password" id="password" class="form-control" />
          <small id="password-error" class="text-danger"></small>
        </div>

        <button type="submit" id="submit-btn" class="btn btn-primary w-100">
          Verify
        </button>
      </form>

      <p id="result" class="mt-3 text-center fw-bold"></p>
    </div>
  </div>

  <script>
    let form = document.getElementById("verify-form");

    function validateEmail(email) {
      let pattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      if (email === "") {
        document.getElementById("email-error").innerText = "Email cannot be empty";
        return false;
      }

      if (!pattern.test(email)) {
        document.getElementById("email-error").innerText = "Enter a valid email";
        return false;
      }

      document.getElementById("email-error").innerText = "";
      return true;
    }

    function validatePassword(password) {
      if (password === "") {
        document.getElementById("password-error").innerText = "Password cannot be empty";
        return false;
      }

      if (password.length < 6) {
        document.getElementById("password-error").innerText = "Password must be at least 6 characters";
        return false;
      }

      document.getElementById("password-error").innerText = "";
      return true;
    }

    async function verifyUser(email, password) {
      const response = await fetch("/verify", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ email, password })
      });

      const data = await response.json();
      return data;
    }

    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      let email = document.getElementById("email").value.trim();
      let password = document.getElementById("password").value.trim();

      let emailValid = validateEmail(email);
      let passwordValid = validatePassword(password);

      if (emailValid && passwordValid) {
        try {
          let result = await verifyUser(email, password);

          document.getElementById("result").innerText = result.message;

          if (result.success) {
            document.getElementById("result").className = "mt-3 text-center fw-bold text-success";
          } else {
            document.getElementById("result").className = "mt-3 text-center fw-bold text-danger";
          }
        } catch (error) {
          document.getElementById("result").innerText = "Server error";
          document.getElementById("result").className = "mt-3 text-center fw-bold text-danger";
          console.log(error);
        }
      }
    });
  </script>
</body>
</html>
